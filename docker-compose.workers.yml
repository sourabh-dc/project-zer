version: "3.9"

services:
  # ===== Celery Workers =====

  # High-priority order processing worker
  celery-orders:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: celery-orders
    container_name: zeroque_celery_orders
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+psycopg2://zeroque:zeroque@postgres:5432/zeroque_dev
      - REDIS_URL=redis://redis:6379/0
    command:
      [
        "celery",
        "-A",
        "zeroque_common.events.celery_app",
        "worker",
        "--loglevel=info",
        "--concurrency=8",
        "--queues=orders",
        "--hostname=orders-worker@%h",
      ]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 512M
          cpus: "0.5"

  # Inventory management worker
  celery-inventory:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: celery-inventory
    container_name: zeroque_celery_inventory
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+psycopg2://zeroque:zeroque@postgres:5432/zeroque_dev
      - REDIS_URL=redis://redis:6379/0
    command:
      [
        "celery",
        "-A",
        "zeroque_common.events.celery_app",
        "worker",
        "--loglevel=info",
        "--concurrency=4",
        "--queues=inventory",
        "--hostname=inventory-worker@%h",
      ]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  # Pricing calculation worker
  celery-pricing:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: celery-pricing
    container_name: zeroque_celery_pricing
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+psycopg2://zeroque:zeroque@postgres:5432/zeroque_dev
      - REDIS_URL=redis://redis:6379/0
    command:
      [
        "celery",
        "-A",
        "zeroque_common.events.celery_app",
        "worker",
        "--loglevel=info",
        "--concurrency=6",
        "--queues=pricing",
        "--hostname=pricing-worker@%h",
      ]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  # Notification worker
  celery-notifications:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: celery-notifications
    container_name: zeroque_celery_notifications
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+psycopg2://zeroque:zeroque@postgres:5432/zeroque_dev
      - REDIS_URL=redis://redis:6379/0
    command:
      [
        "celery",
        "-A",
        "zeroque_common.events.celery_app",
        "worker",
        "--loglevel=info",
        "--concurrency=4",
        "--queues=notifications",
        "--hostname=notification-worker@%h",
      ]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  # Webhook processing worker
  celery-webhooks:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: celery-webhooks
    container_name: zeroque_celery_webhooks
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+psycopg2://zeroque:zeroque@postgres:5432/zeroque_dev
      - REDIS_URL=redis://redis:6379/0
    command:
      [
        "celery",
        "-A",
        "zeroque_common.events.celery_app",
        "worker",
        "--loglevel=info",
        "--concurrency=2",
        "--queues=webhooks",
        "--hostname=webhook-worker@%h",
      ]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"

  # Catalog management worker
  celery-catalog:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: celery-catalog
    container_name: zeroque_celery_catalog
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+psycopg2://zeroque:zeroque@postgres:5432/zeroque_dev
      - REDIS_URL=redis://redis:6379/0
    command:
      [
        "celery",
        "-A",
        "zeroque_common.events.celery_app",
        "worker",
        "--loglevel=info",
        "--concurrency=3",
        "--queues=catalog",
        "--hostname=catalog-worker@%h",
      ]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  # Analytics and reporting worker
  celery-analytics:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: celery-analytics
    container_name: zeroque_celery_analytics
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+psycopg2://zeroque:zeroque@postgres:5432/zeroque_dev
      - REDIS_URL=redis://redis:6379/0
    command:
      [
        "celery",
        "-A",
        "zeroque_common.events.celery_app",
        "worker",
        "--loglevel=info",
        "--concurrency=2",
        "--queues=analytics",
        "--hostname=analytics-worker@%h",
      ]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  # General purpose worker for default queue
  celery-general:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: celery-general
    container_name: zeroque_celery_general
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+psycopg2://zeroque:zeroque@postgres:5432/zeroque_dev
      - REDIS_URL=redis://redis:6379/0
    command:
      [
        "celery",
        "-A",
        "zeroque_common.events.celery_app",
        "worker",
        "--loglevel=info",
        "--concurrency=4",
        "--queues=default,budget,provisioning,identity",
        "--hostname=general-worker@%h",
      ]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  # Celery Beat scheduler for periodic tasks
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: celery-beat
    container_name: zeroque_celery_beat
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+psycopg2://zeroque:zeroque@postgres:5432/zeroque_dev
      - REDIS_URL=redis://redis:6379/0
    command:
      [
        "celery",
        "-A",
        "zeroque_common.events.celery_app",
        "beat",
        "--loglevel=info",
        "--scheduler=celery.beat:PersistentScheduler",
      ]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - celery-beat-data:/app/celerybeat-schedule
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"

volumes:
  celery-beat-data:
