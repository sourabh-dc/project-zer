name: supply-v2
type: Microsoft.App/containerApps
location: uksouth
properties:
  managedEnvironmentId: /subscriptions/<sub>/resourceGroups/<rg>/providers/Microsoft.App/managedEnvironments/<env>
  configuration:
    ingress:
      external: true
      targetPort: 8010
    secrets:
      - name: db-url
        value: <db-url>
      - name: service-bus
        value: <service-bus-connection-string>
      - name: email-connection
        value: <azure-email-connection-string>
      - name: jwt-secret
        value: <jwt-secret>
      - name: internal-api-key
        value: <internal-api-key>
      - name: appinsights-connection
        value: <applicationinsights-connection-string>
  template:
    containers:
      - name: api
        image: <registry>/project-zer-supply-v2:latest
        env:
          - name: PYTHONPATH
            value: /app/src
          - name: SUPPLY_V2_DB_URL
            secretRef: db-url
          - name: SUPPLY_V2_APP_TARGET
            value: combined
          - name: SUPPLY_V2_BROKER_BACKEND
            value: azure_service_bus
          - name: SUPPLY_V2_EMAIL_BACKEND
            value: azure
          - name: SUPPLY_V2_AUTH_MODE
            value: jwt
          - name: SUPPLY_V2_JWT_AUDIENCE
            value: supply-v2
          - name: SUPPLY_V2_JWT_ISSUER
            value: supply-v2
          - name: SUPPLY_V2_JWT_SECRET
            secretRef: jwt-secret
          - name: SUPPLY_V2_INTERNAL_API_KEY
            secretRef: internal-api-key
          - name: AZURE_SERVICE_BUS_CONNECTION_STRING
            secretRef: service-bus
          - name: AZURE_SERVICE_BUS_QUEUE_NAME
            value: supply-notifications
          - name: AZURE_EMAIL_CONNECTION_STRING
            secretRef: email-connection
          - name: AZURE_EMAIL_SENDER
            value: no-reply@example.com
          - name: APPLICATIONINSIGHTS_CONNECTION_STRING
            secretRef: appinsights-connection
        command:
          - python
          - -m
          - supply_v2.run
