location: uksouth
resourceGroup: RG_Zeroque
managedEnvironmentId: /subscriptions/<sub>/resourceGroups/RG_Zeroque/providers/Microsoft.App/managedEnvironments/<env>

apps:
  - name: supply-v2-order
    target: order
    port: 8012
  - name: supply-v2-procurement
    target: procurement
    port: 8013
  - name: supply-v2-vendor
    target: vendor
    port: 8011
  - name: supply-v2-fulfilment
    target: fulfilment
    port: 8014
  - name: supply-v2-dispute
    target: dispute
    port: 8015
  - name: supply-v2-invoice
    target: invoice
    port: 8016
  - name: supply-v2-ops
    target: ops
    port: 8017

sharedEnv:
  PYTHONPATH: /app/src
  SUPPLY_V2_BROKER_BACKEND: azure_service_bus
  SUPPLY_V2_EMAIL_BACKEND: azure
  SUPPLY_V2_AUTH_MODE: jwt
  SUPPLY_V2_JWT_AUDIENCE: supply-v2
  SUPPLY_V2_JWT_ISSUER: supply-v2
  AZURE_SERVICE_BUS_QUEUE_NAME: supply-notifications

sharedSecrets:
  - db-url
  - service-bus
  - email-connection
  - jwt-secret
  - internal-api-key
  - appinsights-connection

workers:
  - name: supply-v2-notification-worker
    command: ["python", "-m", "supply_v2.workers.outbox_worker_main"]
  - name: supply-v2-sla-worker
    command: ["python", "-m", "supply_v2.workers.sla_worker_main"]
  - name: supply-v2-maintenance-worker
    command: ["python", "-m", "supply_v2.workers.maintenance_worker_main"]
