version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: supply
      POSTGRES_PASSWORD: supply
      POSTGRES_DB: supply_v2
    ports:
      - "54329:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U supply -d supply_v2"]
      interval: 5s
      timeout: 5s
      retries: 20

  opa-supply:
    build:
      context: ../policy_engine
      dockerfile: opa_config/Dockerfile
    ports:
      - "8181:8181"

  vendor-service:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ..:/app
    command: sh -c "pip install -e .[dev] && uvicorn supply_v2.apps.vendor_server:app --host 0.0.0.0 --port 8011"
    environment:
      PYTHONPATH: /app/src
      SUPPLY_V2_DB_URL: postgresql+psycopg2://supply:supply@postgres:5432/supply_v2
      SUPPLY_V2_POLICY_MODE: opa
      OPA_URL: http://opa-supply:8181
    depends_on:
      postgres:
        condition: service_healthy
      opa-supply:
        condition: service_started
    ports:
      - "8011:8011"

  order-service:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ..:/app
    command: sh -c "pip install -e .[dev] && uvicorn supply_v2.apps.order_server:app --host 0.0.0.0 --port 8012"
    environment:
      PYTHONPATH: /app/src
      SUPPLY_V2_DB_URL: postgresql+psycopg2://supply:supply@postgres:5432/supply_v2
      SUPPLY_V2_POLICY_MODE: opa
      OPA_URL: http://opa-supply:8181
    depends_on:
      postgres:
        condition: service_healthy
      opa-supply:
        condition: service_started
    ports:
      - "8012:8012"

  procurement-service:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ..:/app
    command: sh -c "pip install -e .[dev] && uvicorn supply_v2.apps.procurement_server:app --host 0.0.0.0 --port 8013"
    environment:
      PYTHONPATH: /app/src
      SUPPLY_V2_DB_URL: postgresql+psycopg2://supply:supply@postgres:5432/supply_v2
      SUPPLY_V2_POLICY_MODE: opa
      OPA_URL: http://opa-supply:8181
    depends_on:
      postgres:
        condition: service_healthy
      opa-supply:
        condition: service_started
    ports:
      - "8013:8013"

  fulfilment-service:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ..:/app
    command: sh -c "pip install -e .[dev] && uvicorn supply_v2.apps.fulfilment_server:app --host 0.0.0.0 --port 8014"
    environment:
      PYTHONPATH: /app/src
      SUPPLY_V2_DB_URL: postgresql+psycopg2://supply:supply@postgres:5432/supply_v2
      SUPPLY_V2_POLICY_MODE: opa
      OPA_URL: http://opa-supply:8181
    depends_on:
      postgres:
        condition: service_healthy
      opa-supply:
        condition: service_started
    ports:
      - "8014:8014"

  dispute-service:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ..:/app
    command: sh -c "pip install -e .[dev] && uvicorn supply_v2.apps.dispute_server:app --host 0.0.0.0 --port 8015"
    environment:
      PYTHONPATH: /app/src
      SUPPLY_V2_DB_URL: postgresql+psycopg2://supply:supply@postgres:5432/supply_v2
      SUPPLY_V2_POLICY_MODE: opa
      OPA_URL: http://opa-supply:8181
    depends_on:
      postgres:
        condition: service_healthy
      opa-supply:
        condition: service_started
    ports:
      - "8015:8015"

  invoice-service:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ..:/app
    command: sh -c "pip install -e .[dev] && uvicorn supply_v2.apps.invoice_server:app --host 0.0.0.0 --port 8016"
    environment:
      PYTHONPATH: /app/src
      SUPPLY_V2_DB_URL: postgresql+psycopg2://supply:supply@postgres:5432/supply_v2
      SUPPLY_V2_POLICY_MODE: opa
      OPA_URL: http://opa-supply:8181
    depends_on:
      postgres:
        condition: service_healthy
      opa-supply:
        condition: service_started
    ports:
      - "8016:8016"

  ops-service:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ..:/app
    command: sh -c "pip install -e .[dev] && uvicorn supply_v2.apps.ops_server:app --host 0.0.0.0 --port 8017"
    environment:
      PYTHONPATH: /app/src
      SUPPLY_V2_DB_URL: postgresql+psycopg2://supply:supply@postgres:5432/supply_v2
      SUPPLY_V2_BROKER_BACKEND: database
      SUPPLY_V2_EMAIL_BACKEND: console
      SUPPLY_V2_POLICY_MODE: opa
      OPA_URL: http://opa-supply:8181
    depends_on:
      postgres:
        condition: service_healthy
      opa-supply:
        condition: service_started
    ports:
      - "8017:8017"

  notification-worker:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ..:/app
    command: sh -c "pip install -e .[dev] && python -m supply_v2.workers.outbox_worker_main"
    environment:
      PYTHONPATH: /app/src
      SUPPLY_V2_DB_URL: postgresql+psycopg2://supply:supply@postgres:5432/supply_v2
    depends_on:
      postgres:
        condition: service_healthy

  sla-worker:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ..:/app
    command: sh -c "pip install -e .[dev] && python -m supply_v2.workers.sla_worker_main"
    environment:
      PYTHONPATH: /app/src
      SUPPLY_V2_DB_URL: postgresql+psycopg2://supply:supply@postgres:5432/supply_v2
    depends_on:
      postgres:
        condition: service_healthy

  maintenance-worker:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ..:/app
    command: sh -c "pip install -e .[dev] && python -m supply_v2.workers.maintenance_worker_main"
    environment:
      PYTHONPATH: /app/src
      SUPPLY_V2_DB_URL: postgresql+psycopg2://supply:supply@postgres:5432/supply_v2
      SUPPLY_V2_BROKER_BACKEND: database
      SUPPLY_V2_EMAIL_BACKEND: console
      SUPPLY_V2_POLICY_MODE: opa
      OPA_URL: http://opa-supply:8181
      AZURE_SERVICE_BUS_CONNECTION_STRING: ${AZURE_SERVICE_BUS_CONNECTION_STRING:-}
      AZURE_SERVICE_BUS_QUEUE_NAME: ${AZURE_SERVICE_BUS_QUEUE_NAME:-supply-notifications}
      AZURE_EMAIL_CONNECTION_STRING: ${AZURE_EMAIL_CONNECTION_STRING:-}
      AZURE_EMAIL_SENDER: ${AZURE_EMAIL_SENDER:-}
    depends_on:
      postgres:
        condition: service_healthy
      opa-supply:
        condition: service_started
