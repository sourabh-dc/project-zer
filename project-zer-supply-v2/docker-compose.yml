services:
  postgres:
    image: postgres:16
    container_name: project-zer-supply-v2-postgres
    environment:
      POSTGRES_USER: supply
      POSTGRES_PASSWORD: supply
      POSTGRES_DB: supply_v2
    ports:
      - "54329:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U supply -d supply_v2"]
      interval: 5s
      timeout: 5s
      retries: 20
