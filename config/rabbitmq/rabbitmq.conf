# RabbitMQ Production Configuration
# ZeroQue Event Bus Configuration

# Network
listeners.tcp.default = 5672
management.tcp.port = 15672

# Memory and Disk
vm_memory_high_watermark.relative = 0.6
disk_free_limit.relative = 2.0

# Logging
log.console = true
log.console.level = info
log.file = true
log.file.level = info
log.file.rotation.date = $D0
log.file.rotation.size = 10485760

# Clustering (for production scaling)
cluster_formation.peer_discovery_backend = rabbit_peer_discovery_classic_config
cluster_formation.classic_config.nodes.1 = rabbit@rabbitmq1
cluster_formation.classic_config.nodes.2 = rabbit@rabbitmq2

# Queue Configuration
default_vhost = /zeroque
default_user = zeroque
default_pass = zeroque_prod_2024

# Performance Tuning
channel_max = 2048
connection_max = 1000
heartbeat = 60
frame_max = 131072

# Message TTL and Limits
default_ttl = 3600000
max_message_size = 134217728

# Security
auth_mechanisms.1 = PLAIN
auth_mechanisms.2 = AMQPLAIN
auth_backends.1 = internal
auth_backends.2 = http

# Management Plugin
management.rates_mode = basic
management.sample_retention_policies.global.minute = 5
management.sample_retention_policies.global.hour = 2
management.sample_retention_policies.global.day = 1


