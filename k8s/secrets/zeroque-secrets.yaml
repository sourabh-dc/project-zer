apiVersion: v1
kind: Secret
metadata:
  name: zeroque-tls-secret
  namespace: zeroque
type: kubernetes.io/tls
stringData:
  tls.crt: |
    -----BEGIN CERTIFICATE-----
    # Your TLS certificate content here
    -----END CERTIFICATE-----
  tls.key: |
    -----BEGIN PRIVATE KEY-----
    # Your TLS private key content here
    -----END PRIVATE KEY-----
