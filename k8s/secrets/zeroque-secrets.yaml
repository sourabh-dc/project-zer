apiVersion: v1
kind: Secret
metadata:
  name: zeroque-database-secret
  namespace: zeroque
type: Opaque
stringData:
  DATABASE_PASSWORD: "your-secure-database-password"
  DATABASE_USER: "zeroque"
  DATABASE_NAME: "zeroque_dev"
  DATABASE_HOST: "postgresql-service"
  DATABASE_PORT: "5432"
---
apiVersion: v1
kind: Secret
metadata:
  name: zeroque-redis-secret
  namespace: zeroque
type: Opaque
stringData:
  REDIS_PASSWORD: "your-secure-redis-password"
  REDIS_USER: "default"
---
apiVersion: v1
kind: Secret
metadata:
  name: zeroque-rabbitmq-secret
  namespace: zeroque
type: Opaque
stringData:
  RABBITMQ_PASSWORD: "your-secure-rabbitmq-password"
  RABBITMQ_USER: "zeroque"
---
apiVersion: v1
kind: Secret
metadata:
  name: zeroque-jwt-secret
  namespace: zeroque
type: Opaque
stringData:
  JWT_SECRET_KEY: "your-super-secure-jwt-secret-key-for-production"
  JWT_ALGORITHM: "HS256"
---
