apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: zeroque-monitoring
data:
  alertmanager.yml: |
    global:
      smtp_smarthost: 'smtp.gmail.com:587'
      smtp_from: 'alerts@zeroque.com'
      smtp_auth_username: 'alerts@zeroque.com'
      smtp_auth_password: 'your-email-password'

    route:
      group_by: ['alertname', 'cluster', 'service']
      group_wait: 10s
      group_interval: 10s
      repeat_interval: 1h
      receiver: 'default'
      routes:
        - match:
            severity: critical
          receiver: 'critical-alerts'
          group_wait: 5s
          repeat_interval: 30m
        - match:
            severity: warning
          receiver: 'warning-alerts'
          group_wait: 10s
          repeat_interval: 1h
        - match:
            service: zeroque
          receiver: 'zeroque-alerts'

    receivers:
      - name: 'default'
        email_configs:
          - to: 'admin@zeroque.com'
            subject: 'ZeroQue Alert: {{ .GroupLabels.alertname }}'
            body: |
              {{ range .Alerts }}
              Alert: {{ .Annotations.summary }}
              Description: {{ .Annotations.description }}
              Labels: {{ range .Labels.SortedPairs }} {{ .Name }}={{ .Value }} {{ end }}
              {{ end }}
      
      - name: 'critical-alerts'
        email_configs:
          - to: 'oncall@zeroque.com'
            subject: '🚨 CRITICAL: ZeroQue Alert - {{ .GroupLabels.alertname }}'
            body: |
              {{ range .Alerts }}
              🚨 CRITICAL ALERT 🚨
              
              Alert: {{ .Annotations.summary }}
              Description: {{ .Annotations.description }}
              Service: {{ .Labels.service }}
              Namespace: {{ .Labels.namespace }}
              Time: {{ .StartsAt }}
              
              Labels:
              {{ range .Labels.SortedPairs }}  {{ .Name }}={{ .Value }}
              {{ end }}
              
              Please investigate immediately!
              {{ end }}
        slack_configs:
          - api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'
            channel: '#alerts-critical'
            title: '🚨 CRITICAL: ZeroQue Alert'
            text: |
              {{ range .Alerts }}
              *Alert:* {{ .Annotations.summary }}
              *Description:* {{ .Annotations.description }}
              *Service:* {{ .Labels.service }}
              *Time:* {{ .StartsAt }}
              {{ end }}
      
      - name: 'warning-alerts'
        email_configs:
          - to: 'team@zeroque.com'
            subject: '⚠️ WARNING: ZeroQue Alert - {{ .GroupLabels.alertname }}'
            body: |
              {{ range .Alerts }}
              ⚠️ WARNING ALERT ⚠️
              
              Alert: {{ .Annotations.summary }}
              Description: {{ .Annotations.description }}
              Service: {{ .Labels.service }}
              Namespace: {{ .Labels.namespace }}
              Time: {{ .StartsAt }}
              
              Labels:
              {{ range .Labels.SortedPairs }}  {{ .Name }}={{ .Value }}
              {{ end }}
              {{ end }}
        slack_configs:
          - api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'
            channel: '#alerts-warning'
            title: '⚠️ WARNING: ZeroQue Alert'
            text: |
              {{ range .Alerts }}
              *Alert:* {{ .Annotations.summary }}
              *Description:* {{ .Annotations.description }}
              *Service:* {{ .Labels.service }}
              *Time:* {{ .StartsAt }}
              {{ end }}
      
      - name: 'zeroque-alerts'
        email_configs:
          - to: 'zeroque-team@zeroque.com'
            subject: 'ZeroQue Service Alert - {{ .GroupLabels.alertname }}'
            body: |
              {{ range .Alerts }}
              ZeroQue Service Alert
              
              Alert: {{ .Annotations.summary }}
              Description: {{ .Annotations.description }}
              Service: {{ .Labels.service }}
              Namespace: {{ .Labels.namespace }}
              Time: {{ .StartsAt }}
              
              Labels:
              {{ range .Labels.SortedPairs }}  {{ .Name }}={{ .Value }}
              {{ end }}
              {{ end }}
        webhook_configs:
          - url: 'http://zeroque-webhook-service:8080/webhook'
            send_resolved: true
            http_config:
              basic_auth:
                username: 'webhook-user'
                password: 'webhook-password'

    inhibit_rules:
      - source_match:
          severity: 'critical'
        target_match:
          severity: 'warning'
        equal: ['alertname', 'cluster', 'service']

