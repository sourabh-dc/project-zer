apiVersion: v1
kind: ServiceAccount
metadata:
  name: zeroque-service-account
  namespace: zeroque
  labels:
    app: zeroque
    version: "4.1"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: zeroque
  name: zeroque-role
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods", "services"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: zeroque-role-binding
  namespace: zeroque
subjects:
  - kind: ServiceAccount
    name: zeroque-service-account
    namespace: zeroque
roleRef:
  kind: Role
  name: zeroque-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: zeroque-cluster-role
rules:
  - apiGroups: [""]
    resources: ["nodes", "namespaces"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["nodes", "pods"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: zeroque-cluster-role-binding
subjects:
  - kind: ServiceAccount
    name: zeroque-service-account
    namespace: zeroque
roleRef:
  kind: ClusterRole
  name: zeroque-cluster-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: zeroque-monitoring
  name: zeroque-monitoring-role
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "endpoints"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: zeroque-monitoring-role-binding
  namespace: zeroque-monitoring
subjects:
  - kind: ServiceAccount
    name: zeroque-monitoring-service-account
    namespace: zeroque-monitoring
roleRef:
  kind: Role
  name: zeroque-monitoring-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: zeroque-monitoring-service-account
  namespace: zeroque-monitoring
  labels:
    app: zeroque-monitoring
    version: "4.1"




