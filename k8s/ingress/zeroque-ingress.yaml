apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: zeroque-ingress
  namespace: zeroque
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/rate-limit: "1000"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
spec:
  tls:
    - hosts:
        - api.zeroque.com
        - provisioning.zeroque.com
        - orders.zeroque.com
        - payments.zeroque.com
        - pricing.zeroque.com
        - billing.zeroque.com
        - notifications.zeroque.com
        - catalog.zeroque.com
        - subscriptions.zeroque.com
        - entitlements.zeroque.com
        - ledger.zeroque.com
        - monitoring.zeroque.com
        - observability.zeroque.com
        - reports.zeroque.com
        - usage.zeroque.com
        - identity.zeroque.com
        - approvals.zeroque.com
        - cv-connector.zeroque.com
        - cv-gateway.zeroque.com
        - entry.zeroque.com
        - events.zeroque.com
        - service-registry.zeroque.com
      secretName: zeroque-tls-secret
  rules:
    # Provisioning Service
    - host: provisioning.zeroque.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: provisioning-service
                port:
                  number: 8000

    # Orders Service
    - host: orders.zeroque.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: orders-service
                port:
                  number: 8224

    # Payments Service
    - host: payments.zeroque.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: payments-service
                port:
                  number: 8225

    # Pricing Service
    - host: pricing.zeroque.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pricing-service
                port:
                  number: 8226

    # Billing Service
