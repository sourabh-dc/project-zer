      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: billing-service
                port:
                  number: 8214

    # Notifications Service
    - host: notifications.zeroque.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: notifications-service
                port:
                  number: 8222

    # Catalog Service
