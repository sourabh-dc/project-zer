apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: zeroque-default-deny
  namespace: zeroque
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: zeroque-allow-internal
  namespace: zeroque
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: zeroque
        - namespaceSelector:
            matchLabels:
              name: zeroque-monitoring
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              name: zeroque
        - namespaceSelector:
            matchLabels:
              name: zeroque-monitoring
    - to: []
      ports:
        - protocol: TCP
          port: 53
        - protocol: UDP
          port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: zeroque-allow-ingress
  namespace: zeroque
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: ingress
  policyTypes:
    - Ingress
  ingress:
    - from: []
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 443
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: zeroque-allow-monitoring
  namespace: zeroque
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: zeroque-monitoring
      ports:
        - protocol: TCP
          port: 9090
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: zeroque-allow-database
