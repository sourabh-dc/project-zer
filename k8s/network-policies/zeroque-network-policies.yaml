---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: zeroque-monitoring-allow
  namespace: zeroque-monitoring
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: zeroque
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              name: zeroque
    - to: []
      ports:
        - protocol: TCP
          port: 53
        - protocol: UDP
          port: 53

