  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: zeroque
      ports:
        - protocol: TCP
          port: 5432
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: zeroque-allow-redis
  namespace: zeroque
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: zeroque
      ports:
        - protocol: TCP
