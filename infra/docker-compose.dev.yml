version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: zeroque_pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: zeroque
      POSTGRES_PASSWORD: zeroque
      POSTGRES_DB: zeroque_dev
    ports:
      - "5000:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: zeroque_redis
    restart: unless-stopped
    ports:
      - "4000:6379"

volumes:
  pgdata:
