name: ZeroQue Production Deployment

on:
  push:
    branches: [main, production]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: zeroque

jobs:
  # Security and Quality Checks
  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-results.sarif"

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: "trivy-results.sarif"

      - name: Run Bandit security linter
        run: |
          pip install bandit
          bandit -r services/ -f json -o bandit-report.json || true

      - name: Run Safety dependency check
        run: |
          pip install safety
          safety check --json --output safety-report.json || true

  # Code Quality and Testing
  code-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov black flake8 mypy

      - name: Run Black code formatter
        run: black --check services/

      - name: Run Flake8 linter
        run: flake8 services/ --max-line-length=88 --extend-ignore=E203,W503

      - name: Run MyPy type checker
        run: mypy services/ --ignore-missing-imports

      - name: Run unit tests
        run: |
          pytest services/ --cov=services/ --cov-report=xml --cov-report=html

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella

  # Database Migration Tests
  database-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: zeroque_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install alembic psycopg2-binary

      - name: Test database migrations
        run: |
          export DATABASE_URL="postgresql://postgres:postgres@localhost:5432/zeroque_test"
          alembic upgrade head
          alembic downgrade base
          alembic upgrade head

      - name: Test RLS policies
        run: |
          export DATABASE_URL="postgresql://postgres:postgres@localhost:5432/zeroque_test"
          python scripts/test_rls_policies.py

  # Load Testing
  load-testing:
    runs-on: ubuntu-latest
    needs: [security-audit, code-quality, database-tests]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/production'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install load testing tools
        run: |
          pip install locust k6

      - name: Run Locust load tests
        run: |
          locust -f tests/load/locustfile.py --headless -u 100 -r 10 -t 300s --html load-test-report.html

      - name: Upload load test results
        uses: actions/upload-artifact@v3
        with:
          name: load-test-results
          path: load-test-report.html

  # Build and Push Docker Images
  build-and-push:
    runs-on: ubuntu-latest
    needs: [security-audit, code-quality, database-tests]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/production'

    strategy:
      matrix:
        service:
          [
            "orders",
            "identity",
            "ledger",
            "payments",
            "events",
            "cv-gateway",
            "cv-connector",
            "approvals",
            "entitlements",
            "subscriptions",
            "notifications",
            "reports",
            "usage",
            "observability",
            "service-registry",
            "monitoring",
          ]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./services/${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Deploy to Staging
  deploy-staging:
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: github.ref == 'refs/heads/main'
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging
        run: |
          echo "Deploying to staging environment..."
          # Add staging deployment commands here
          # kubectl apply -f k8s/staging/
          # helm upgrade --install zeroque-staging helm/zeroque --values helm/values-staging.yaml

  # Deploy to Production
  deploy-production:
    runs-on: ubuntu-latest
    needs: [build-and-push, load-testing]
    if: github.ref == 'refs/heads/production'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production
        run: |
          echo "Deploying to production environment..."
          # Add production deployment commands here
          # kubectl apply -f k8s/production/
          # helm upgrade --install zeroque-prod helm/zeroque --values helm/values-production.yaml

      - name: Run post-deployment health checks
        run: |
          echo "Running post-deployment health checks..."
          # Add health check commands here
          # ./scripts/health-check.sh production

      - name: Notify deployment success
        if: success()
        run: |
          echo "Production deployment successful!"
          # Add notification logic here (Slack, email, etc.)

  # Security Audit Report
  security-report:
    runs-on: ubuntu-latest
    needs: [security-audit, code-quality, database-tests]
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: Generate security report
        run: |
          echo "Generating comprehensive security audit report..."
          # Combine all security scan results
          # Generate executive summary
          # Create actionable recommendations

      - name: Upload security report
        uses: actions/upload-artifact@v3
        with:
          name: security-audit-report
          path: security-report.html


