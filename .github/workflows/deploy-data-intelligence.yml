name: Deploy Data Intelligence Service (API + Worker)

on:
  push:
    branches:
      - production
    paths:
      - "data_intelligence_service/**"
      - "shared/**"
      - "requirements.txt"
  workflow_dispatch:

jobs:
  # ── Build & Push Images ──────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component:
          - name: api
            dockerfile: data_intelligence_service/Dockerfile
            image: ${{ secrets.ACR_NAME }}.azurecr.io/data-intelligence-api
          - name: worker
            dockerfile: data_intelligence_service/Dockerfile.worker
            image: ${{ secrets.ACR_NAME }}.azurecr.io/data-intelligence-worker
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build and push ${{ matrix.component.name }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.component.dockerfile }}
          push: true
          tags: |
            ${{ matrix.component.image }}:${{ github.sha }}
            ${{ matrix.component.image }}:latest

  # ── Deploy API ───────────────────────────────────────────────────
  deploy-api:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy data-intelligence-api
        uses: azure/container-apps-deploy-action@v2
        with:
          acrName: ${{ secrets.ACR_NAME }}
          containerAppName: data-intelligence-api
          resourceGroup: ${{ secrets.RESOURCE_GROUP }}
          imageToDeploy: ${{ secrets.ACR_NAME }}.azurecr.io/data-intelligence-api:${{ github.sha }}

  # ── Deploy Worker ────────────────────────────────────────────────
  deploy-worker:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy data-intelligence-worker
        uses: azure/container-apps-deploy-action@v2
        with:
          acrName: ${{ secrets.ACR_NAME }}
          containerAppName: data-intelligence-worker
          resourceGroup: ${{ secrets.RESOURCE_GROUP }}
          imageToDeploy: ${{ secrets.ACR_NAME }}.azurecr.io/data-intelligence-worker:${{ github.sha }}
