name: Deploy OPA Policy Server

on:
  push:
    branches:
      - production
    paths:
      - "shared/opa_policies/**"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build and push opa-server
        uses: docker/build-push-action@v5
        with:
          context: shared/opa_policies
          file: shared/opa_policies/Dockerfile
          push: true
          tags: |
            ${{ secrets.ACR_NAME }}.azurecr.io/opa-server:${{ github.sha }}
            ${{ secrets.ACR_NAME }}.azurecr.io/opa-server:latest

      - name: Deploy opa-server
        uses: azure/container-apps-deploy-action@v2
        with:
          acrName: ${{ secrets.ACR_NAME }}
          containerAppName: opa-server
          resourceGroup: ${{ secrets.RESOURCE_GROUP }}
          imageToDeploy: ${{ secrets.ACR_NAME }}.azurecr.io/opa-server:${{ github.sha }}
