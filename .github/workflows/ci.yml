name: ci
on: [push, pull_request]
jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: python -m venv .venv && . .venv/bin/activate && pip install -r requirements.txt && pip install -e ./packages/zeroque_common ruff black mypy pytest
      - run: . .venv/bin/activate && ruff . && black --check . && mypy packages services
      - run: . .venv/bin/activate && pytest -q
