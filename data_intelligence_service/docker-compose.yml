version: "3.9"

# ─── ZeroQue Data Intelligence Service — Local Dev Stack ─────────────────────
#
# Start everything:
#   docker compose up -d
#
# Start only databases (app runs locally with uvicorn):
#   docker compose up -d postgres neo4j
#
# Wait ~20s for Neo4j to initialise before starting the app.
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL + pgvector ──────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: zeroque-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: zeroque
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Neo4j ─────────────────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5
    container_name: zeroque-neo4j
    ports:
      - "7474:7474"    # browser UI
      - "7687:7687"    # bolt (application)
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_pagecache_size: 512M
      NEO4J_dbms_memory_heap_max__size: 512M
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "password", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  # ── Redis — session memory + rate limiting ────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: zeroque-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Intelligence Service (web) ─────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zeroque-intelligence
    ports:
      - "8004:8004"
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      NEO4J_URI: bolt://neo4j:7687
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Outbox Worker ──────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: zeroque-worker
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      NEO4J_URI: bolt://neo4j:7687
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  neo4j_data:
  redis_data:
