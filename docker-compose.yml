services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: zeroque-postgres
    environment:
      POSTGRES_USER: zeroque
      POSTGRES_PASSWORD: zeroque_dev_password
      POSTGRES_DB: zeroque_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zeroque"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: zeroque-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Provisioning Service
  provisioning:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zeroque-provisioning
    environment:
      DATABASE_URL: postgresql://zeroque:zeroque_dev_password@postgres:5432/zeroque_dev
      REDIS_URL: redis://redis:6379/0
      PORT: 8000
      LOG_LEVEL: INFO
      ALLOW_ORIGINS: "*"
      POLICY_ENGINE_URL: http://policy-engine:8004
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      policy-engine:
        condition: service_healthy
    restart: unless-stopped

  # Policy Engine Service
  policy-engine:
    build:
      context: .
      dockerfile: policy_engine/Dockerfile
    container_name: zeroque-policy-engine
    environment:
      DATABASE_URL: postgresql://zeroque:zeroque_dev_password@postgres:5432/zeroque_dev
      REDIS_URL: redis://redis:6379/1
      PORT: 8004
      LOG_LEVEL: INFO
      ALLOW_ORIGINS: "*"
      ENABLE_DECISION_LOGGING: "true"
      ENABLE_METRICS: "true"
      POLICY_CACHE_TTL_SECONDS: "300"
      DECISION_LOG_RETENTION_DAYS: "90"
    ports:
      - "8004:8004"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:


