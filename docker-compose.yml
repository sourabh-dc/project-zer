version: "3.8"

services:
  # ===== Infrastructure Services =====

  # Message Broker
  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: zeroque-rabbitmq
    ports:
      - "5672:5672" # AMQP port
      - "15672:15672" # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: zeroque
      RABBITMQ_DEFAULT_PASS: zeroque_prod_2024
      RABBITMQ_DEFAULT_VHOST: /zeroque
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - zeroque-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Production Database
  postgres:
    image: postgres:15-alpine
    container_name: zeroque-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: zeroque_prod
      POSTGRES_USER: zeroque
      POSTGRES_PASSWORD: zeroque_prod_2024_secure
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./config/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - zeroque-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zeroque -d zeroque_prod"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Redis for Caching
  redis:
    image: redis:7-alpine
    container_name: zeroque-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - zeroque-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Monitoring Stack
  prometheus:
    image: prom/prometheus:latest
    container_name: zeroque-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - zeroque-network
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"

  grafana:
    image: grafana/grafana:latest
    container_name: zeroque-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: zeroque_admin_2024
      GF_USERS_ALLOW_SIGN_UP: false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards
    networks:
      - zeroque-network
    restart: unless-stopped

  # Load Balancer (disabled for local compose; service configs not present)
  # nginx:
  #   image: nginx:alpine
  #   container_name: zeroque-nginx
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf
  #     - ./config/nginx/ssl:/etc/nginx/ssl
  #     - ./logs/nginx:/var/log/nginx
  #   networks:
  #     - zeroque-network
  #   restart: unless-stopped
  #   depends_on:
  #     - rabbitmq
  #     - postgres
  #     - redis

  # ===== Core Microservices =====

  # Orders Service
  orders:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zeroque-orders
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgresql://zeroque:zeroque_prod_2024_secure@postgres:5432/zeroque_prod
      - REDIS_URL=redis://redis:6379/0
      - RABBITMQ_URL=amqp://zeroque:zeroque_prod_2024@rabbitmq:5672/
      - PORT=8080
      - SERVICE_NAME=orders
    networks:
      - zeroque-network
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: ["python", "-m", "services.orders.main"]

  # Identity Service
  identity:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zeroque-identity
    ports:
      - "8085:8085"
    environment:
      - DATABASE_URL=postgresql://zeroque:zeroque_prod_2024_secure@postgres:5432/zeroque_prod
      - REDIS_URL=redis://redis:6379/0
      - RABBITMQ_URL=amqp://zeroque:zeroque_prod_2024@rabbitmq:5672/zeroque
      - PORT=8085
      - SERVICE_NAME=identity
    networks:
      - zeroque-network
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: ["python", "-m", "services.identity.main"]

  # Ledger Service
  ledger:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zeroque-ledger
    ports:
      - "8086:8086"
    environment:
      - DATABASE_URL=postgresql://zeroque:zeroque_prod_2024_secure@postgres:5432/zeroque_prod
      - REDIS_URL=redis://redis:6379/0
      - RABBITMQ_URL=amqp://zeroque:zeroque_prod_2024@rabbitmq:5672/zeroque
      - PORT=8086
      - SERVICE_NAME=ledger
    networks:
      - zeroque-network
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: ["python", "-m", "services.ledger.main"]

  # Payments Service
  payments:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zeroque-payments
    ports:
      - "8087:8087"
    environment:
      - DATABASE_URL=postgresql://zeroque:zeroque_prod_2024_secure@postgres:5432/zeroque_prod
      - REDIS_URL=redis://redis:6379/0
      - RABBITMQ_URL=amqp://zeroque:zeroque_prod_2024@rabbitmq:5672/zeroque
      - PORT=8087
      - SERVICE_NAME=payments
    networks:
      - zeroque-network
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: ["python", "-m", "services.payments.main"]

  # Events Service
  events:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zeroque-events
    ports:
      - "8088:8088"
    environment:
      - DATABASE_URL=postgresql://zeroque:zeroque_prod_2024_secure@postgres:5432/zeroque_prod
      - REDIS_URL=redis://redis:6379/0
      - RABBITMQ_URL=amqp://zeroque:zeroque_prod_2024@rabbitmq:5672/zeroque
      - PORT=8088
      - SERVICE_NAME=events
    networks:
      - zeroque-network
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: ["python", "-m", "services.events.main"]

  # CV Gateway Service
  cv-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zeroque-cv-gateway
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://zeroque:zeroque_prod_2024_secure@postgres:5432/zeroque_prod
      - REDIS_URL=redis://redis:6379/0
      - RABBITMQ_URL=amqp://zeroque:zeroque_prod_2024@rabbitmq:5672/zeroque
      - PORT=8000
      - SERVICE_NAME=cv-gateway
    networks:
      - zeroque-network
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: ["python", "-m", "services.cv_gateway.main"]

  # CV Connector Service
  cv-connector:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zeroque-cv-connector
    ports:
      - "8100:8100"
    environment:
      - DATABASE_URL=postgresql://zeroque:zeroque_prod_2024_secure@postgres:5432/zeroque_prod
      - REDIS_URL=redis://redis:6379/0
      - RABBITMQ_URL=amqp://zeroque:zeroque_prod_2024@rabbitmq:5672/zeroque
      - PORT=8100
      - SERVICE_NAME=cv-connector
    networks:
      - zeroque-network
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: ["python", "-m", "services.cv_connector.main"]

  # Approvals Service
  approvals:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zeroque-approvals
    ports:
      - "8213:8213"
    environment:
      - DATABASE_URL=postgresql://zeroque:zeroque_prod_2024_secure@postgres:5432/zeroque_prod
      - REDIS_URL=redis://redis:6379/0
      - RABBITMQ_URL=amqp://zeroque:zeroque_prod_2024@rabbitmq:5672/zeroque
      - PORT=8213
      - SERVICE_NAME=approvals
    networks:
      - zeroque-network
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: ["python", "-m", "services.approvals.main"]

  # Entitlements Service
  entitlements:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zeroque-entitlements
    ports:
      - "8211:8211"
    environment:
      - DATABASE_URL=postgresql://zeroque:zeroque_prod_2024_secure@postgres:5432/zeroque_prod
      - REDIS_URL=redis://redis:6379/0
      - RABBITMQ_URL=amqp://zeroque:zeroque_prod_2024@rabbitmq:5672/zeroque
      - PORT=8211
      - SERVICE_NAME=entitlements
    networks:
      - zeroque-network
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: ["python", "-m", "services.entitlements.main"]

  # Subscriptions Service
  subscriptions:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zeroque-subscriptions
    ports:
      - "8212:8212"
    environment:
      - DATABASE_URL=postgresql://zeroque:zeroque_prod_2024_secure@postgres:5432/zeroque_prod
      - REDIS_URL=redis://redis:6379/0
      - RABBITMQ_URL=amqp://zeroque:zeroque_prod_2024@rabbitmq:5672/zeroque
      - PORT=8212
      - SERVICE_NAME=subscriptions
    networks:
      - zeroque-network
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: ["python", "-m", "services.subscriptions.main"]

  # Notifications Service
  notifications:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zeroque-notifications
    ports:
      - "8300:8300"
    environment:
      - DATABASE_URL=postgresql://zeroque:zeroque_prod_2024_secure@postgres:5432/zeroque_prod
      - REDIS_URL=redis://redis:6379/0
      - RABBITMQ_URL=amqp://zeroque:zeroque_prod_2024@rabbitmq:5672/zeroque
      - PORT=8300
      - SERVICE_NAME=notifications
    networks:
      - zeroque-network
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: ["python", "-m", "services.notifications.main"]

  # Reports Service
  reports:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zeroque-reports
    ports:
      - "8400:8400"
    environment:
      - DATABASE_URL=postgresql://zeroque:zeroque_prod_2024_secure@postgres:5432/zeroque_prod
      - REDIS_URL=redis://redis:6379/0
      - RABBITMQ_URL=amqp://zeroque:zeroque_prod_2024@rabbitmq:5672/zeroque
      - PORT=8400
      - SERVICE_NAME=reports
    networks:
      - zeroque-network
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: ["python", "-m", "services.reports.main"]

  # Usage Service
  usage:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zeroque-usage
    ports:
      - "8200:8200"
    environment:
      - DATABASE_URL=postgresql://zeroque:zeroque_prod_2024_secure@postgres:5432/zeroque_prod
      - REDIS_URL=redis://redis:6379/0
      - RABBITMQ_URL=amqp://zeroque:zeroque_prod_2024@rabbitmq:5672/zeroque
      - PORT=8200
      - SERVICE_NAME=usage
    networks:
      - zeroque-network
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: ["python", "-m", "services.usage.main"]

  # Observability Service
  observability:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zeroque-observability
    ports:
      - "8600:8600"
    environment:
      - DATABASE_URL=postgresql://zeroque:zeroque_prod_2024_secure@postgres:5432/zeroque_prod
      - REDIS_URL=redis://redis:6379/0
      - RABBITMQ_URL=amqp://zeroque:zeroque_prod_2024@rabbitmq:5672/zeroque
      - PORT=8600
      - SERVICE_NAME=observability
    networks:
      - zeroque-network
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: ["python", "-m", "services.observability.main"]

  # Service Registry
  service-registry:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zeroque-service-registry
    ports:
      - "8500:8500"
    environment:
      - DATABASE_URL=postgresql://zeroque:zeroque_prod_2024_secure@postgres:5432/zeroque_prod
      - REDIS_URL=redis://redis:6379/0
      - RABBITMQ_URL=amqp://zeroque:zeroque_prod_2024@rabbitmq:5672/zeroque
      - PORT=8500
      - SERVICE_NAME=service-registry
    networks:
      - zeroque-network
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: ["python", "-m", "services.service_registry.main"]

  # Provisioning Service (for E2E testing)
  provisioning:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zeroque-provisioning
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://zeroque:zeroque_prod_2024_secure@postgres:5432/zeroque_prod
      - REDIS_URL=redis://redis:6379/0
      - RABBITMQ_URL=amqp://zeroque:zeroque_prod_2024@rabbitmq:5672/
      - SERVICE_PORT=8000
      - SERVICE_NAME=provisioning
      - ALLOW_DEMO=true
    networks:
      - zeroque-network
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
      - rabbitmq
    command: ["python", "-m", "services.provisioning.main"]

  # Monitoring Service
  monitoring:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zeroque-monitoring
    ports:
      - "8700:8700"
    environment:
      - DATABASE_URL=postgresql://zeroque:zeroque_prod_2024_secure@postgres:5432/zeroque_prod
      - REDIS_URL=redis://redis:6379/0
      - RABBITMQ_URL=amqp://zeroque:zeroque_prod_2024@rabbitmq:5672/zeroque
      - PORT=8700
      - SERVICE_NAME=monitoring
    networks:
      - zeroque-network
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: ["python", "-m", "services.monitoring.main"]

  # ===== Celery Workers =====

  # Event Processing Worker
  celery-events:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zeroque-celery-events
    environment:
      - DATABASE_URL=postgresql://zeroque:zeroque_prod_2024_secure@postgres:5432/zeroque_prod
      - REDIS_URL=redis://redis:6379/0
      - RABBITMQ_URL=amqp://zeroque:zeroque_prod_2024@rabbitmq:5672/zeroque
    command:
      [
        "celery",
        "-A",
        "services.events.main:celery_app",
        "worker",
        "--loglevel=info",
        "--concurrency=4",
        "--queues=events",
      ]
    networks:
      - zeroque-network
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # Order Processing Worker
  celery-orders:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zeroque-celery-orders
    environment:
      - DATABASE_URL=postgresql://zeroque:zeroque_prod_2024_secure@postgres:5432/zeroque_prod
      - REDIS_URL=redis://redis:6379/0
      - RABBITMQ_URL=amqp://zeroque:zeroque_prod_2024@rabbitmq:5672/zeroque
    command:
      [
        "celery",
        "-A",
        "services.orders.main:celery_app",
        "worker",
        "--loglevel=info",
        "--concurrency=4",
        "--queues=orders",
      ]
    networks:
      - zeroque-network
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # Notification Worker
  celery-notifications:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zeroque-celery-notifications
    environment:
      - DATABASE_URL=postgresql://zeroque:zeroque_prod_2024_secure@postgres:5432/zeroque_prod
      - REDIS_URL=redis://redis:6379/0
      - RABBITMQ_URL=amqp://zeroque:zeroque_prod_2024@rabbitmq:5672/zeroque
    command:
      [
        "celery",
        "-A",
        "services.notifications.main:celery_app",
        "worker",
        "--loglevel=info",
        "--concurrency=2",
        "--queues=notifications",
      ]
    networks:
      - zeroque-network
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  rabbitmq_data:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  zeroque-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
